# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on:
  release:
    types: [published]

env:
  # 与 src/main/resources/fabric.mod.json 中 id 一致
  MOD_ID: mc-agents

jobs:
  discover:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: discover Minecraft / Fabric API versions
        id: set-matrix
        env:
          MIN_MC: '1.19.4'
          FABRIC_META_URL: 'https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml'
        run: |
          set -euo pipefail
          curl -fsSL "$FABRIC_META_URL" -o /tmp/fabric-api-maven-metadata.xml
          grep -oE '[0-9]+\.[0-9.]+\+1\.(19|20|21)\.[0-9]+' /tmp/fabric-api-maven-metadata.xml | sort -uV > /tmp/fabric-api-all.txt
          [[ -s /tmp/fabric-api-all.txt ]] || { echo "No fabric-api versions parsed from metadata" >&2; exit 1; }
          mapfile -t MC_VERSIONS < <(sed 's/.*+//' /tmp/fabric-api-all.txt | sort -uV)
          items=()
          for mc in "${MC_VERSIONS[@]}"; do
            low="$(printf '%s\n' "$MIN_MC" "$mc" | sort -V | head -1)"
            [[ "$low" == "$MIN_MC" ]] || continue
            latest="$(awk -F'+' -v mc="$mc" 'NF == 2 && $2 == mc' /tmp/fabric-api-all.txt | sort -V | tail -1)"
            [[ -n "$latest" ]] || continue
            items+=("$(printf '{"minecraft_version":"%s","fabric_api_version":"%s"}' "$mc" "$latest")")
          done
          [[ ${#items[@]} -gt 0 ]] || { echo "No matrix entries after filtering" >&2; exit 1; }
          json="$(printf '[%s]' "$(IFS=,; echo "${items[*]}")")"
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Matrix: $json"

  build:
    needs: discover
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build ${{ env.MOD_ID }} for Minecraft ${{ matrix.minecraft_version }}
        env:
          MOD_ID: ${{ env.MOD_ID }}
        run: |
          set -euo pipefail
          echo "Building ${MOD_ID}-${{ matrix.minecraft_version }}.jar (Fabric API ${{ matrix.fabric_api_version }})"
          ./gradlew clean build --no-daemon \
            -Pminecraft_version="${{ matrix.minecraft_version }}" \
            -Pfabric_api_version="${{ matrix.fabric_api_version }}"
          JAR=""
          for f in build/libs/*.jar; do
            [[ -f "$f" ]] || continue
            case "$f" in
              *-sources.jar|*-dev.jar|*-javadoc.jar) continue ;;
              *) JAR="$f"; break ;;
            esac
          done
          if [[ -z "$JAR" ]]; then
            echo "No main jar found in build/libs" >&2
            ls -la build/libs/ || true
            exit 1
          fi
          cp "$JAR" "${MOD_ID}-${{ matrix.minecraft_version }}.jar"
          ls -la "${MOD_ID}-${{ matrix.minecraft_version }}.jar"
      - name: upload jar artifact
        uses: actions/upload-artifact@v7
        with:
          name: jar-${{ matrix.minecraft_version }}
          path: ${{ env.MOD_ID }}-${{ matrix.minecraft_version }}.jar

  upload-release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download all jars
        uses: actions/download-artifact@v8
        with:
          pattern: jar-*
          path: dist
          merge-multiple: true
      - name: list dist
        env:
          MOD_ID: ${{ env.MOD_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/"${MOD_ID}"-*.jar)
          [[ ${#files[@]} -gt 0 ]] || { echo "No dist/${MOD_ID}-*.jar after download" >&2; exit 1; }
          ls -la dist/
      - name: upload jars to current GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOD_ID: ${{ env.MOD_ID }}
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          shopt -s nullglob
          files=(dist/"${MOD_ID}"-*.jar)
          [[ ${#files[@]} -gt 0 ]] || { echo "No dist/${MOD_ID}-*.jar to upload" >&2; exit 1; }
          gh release upload "$tag" "${files[@]}" --clobber -R "${{ github.repository }}"
      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: dist/${{ env.MOD_ID }}-*.jar
