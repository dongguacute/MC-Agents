# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on:
  release:
    types: [published]

env:
  # 与 src/main/resources/fabric.mod.json 中 id 一致
  MOD_ID: mc-agents
  # Modrinth 项目 slug 或 base62 ID；若与 MOD_ID 不同，在仓库 Variables 中设置 MODRINTH_PROJECT_ID 覆盖

jobs:
  discover:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: discover Minecraft / Fabric API versions
        id: set-matrix
        env:
          MIN_MC: '1.19.4'
          FABRIC_META_URL: 'https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml'
        run: |
          set -euo pipefail
          curl -fsSL "$FABRIC_META_URL" -o /tmp/fabric-api-maven-metadata.xml
          grep -oE '[0-9]+\.[0-9.]+\+1\.(19|20|21)\.[0-9]+' /tmp/fabric-api-maven-metadata.xml | sort -uV > /tmp/fabric-api-all.txt
          [[ -s /tmp/fabric-api-all.txt ]] || { echo "No fabric-api versions parsed from metadata" >&2; exit 1; }
          mapfile -t MC_VERSIONS < <(sed 's/.*+//' /tmp/fabric-api-all.txt | sort -uV)
          items=()
          for mc in "${MC_VERSIONS[@]}"; do
            low="$(printf '%s\n' "$MIN_MC" "$mc" | sort -V | head -1)"
            [[ "$low" == "$MIN_MC" ]] || continue
            latest="$(awk -F'+' -v mc="$mc" 'NF == 2 && $2 == mc' /tmp/fabric-api-all.txt | sort -V | tail -1)"
            [[ -n "$latest" ]] || continue
            items+=("$(printf '{"minecraft_version":"%s","fabric_api_version":"%s"}' "$mc" "$latest")")
          done
          [[ ${#items[@]} -gt 0 ]] || { echo "No matrix entries after filtering" >&2; exit 1; }
          json="$(printf '[%s]' "$(IFS=,; echo "${items[*]}")")"
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Matrix: $json"

  build:
    needs: discover
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build ${{ env.MOD_ID }} for Minecraft ${{ matrix.minecraft_version }}
        env:
          MOD_ID: ${{ env.MOD_ID }}
        run: |
          set -euo pipefail
          echo "Building ${MOD_ID}-${{ matrix.minecraft_version }}.jar (Fabric API ${{ matrix.fabric_api_version }})"
          ./gradlew clean build --no-daemon \
            -Pminecraft_version="${{ matrix.minecraft_version }}" \
            -Pfabric_api_version="${{ matrix.fabric_api_version }}"
          JAR=""
          for f in build/libs/*.jar; do
            [[ -f "$f" ]] || continue
            case "$f" in
              *-sources.jar|*-dev.jar|*-javadoc.jar) continue ;;
              *) JAR="$f"; break ;;
            esac
          done
          if [[ -z "$JAR" ]]; then
            echo "No main jar found in build/libs" >&2
            ls -la build/libs/ || true
            exit 1
          fi
          cp "$JAR" "${MOD_ID}-${{ matrix.minecraft_version }}.jar"
          ls -la "${MOD_ID}-${{ matrix.minecraft_version }}.jar"
      - name: upload jar artifact
        uses: actions/upload-artifact@v7
        with:
          name: jar-${{ matrix.minecraft_version }}
          path: ${{ env.MOD_ID }}-${{ matrix.minecraft_version }}.jar

  upload-release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download all jars
        uses: actions/download-artifact@v8
        with:
          pattern: jar-*
          path: dist
          merge-multiple: true
      - name: list dist
        env:
          MOD_ID: ${{ env.MOD_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/"${MOD_ID}"-*.jar)
          [[ ${#files[@]} -gt 0 ]] || { echo "No dist/${MOD_ID}-*.jar after download" >&2; exit 1; }
          ls -la dist/
      - name: upload jars to current GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOD_ID: ${{ env.MOD_ID }}
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          shopt -s nullglob
          files=(dist/"${MOD_ID}"-*.jar)
          [[ ${#files[@]} -gt 0 ]] || { echo "No dist/${MOD_ID}-*.jar to upload" >&2; exit 1; }
          gh release upload "$tag" "${files[@]}" --clobber -R "${{ github.repository }}"
      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: dist/${{ env.MOD_ID }}-*.jar

  upload-modrinth:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: download all jars
        uses: actions/download-artifact@v8
        with:
          pattern: jar-*
          path: dist
          merge-multiple: true
      - name: upload to Modrinth
        run: |
          set -euo pipefail
          if [[ -z "${MODRINTH_TOKEN:-}" ]]; then
            echo "::notice::MODRINTH_TOKEN is not set; skipping Modrinth upload."
            exit 0
          fi
          UA="${GITHUB_REPOSITORY}/${GITHUB_RUN_ID} (github.com/${GITHUB_REPOSITORY})"
          PROJECT_ID="${MODRINTH_PROJECT_ID:-$MOD_ID}"
          TAG="${RELEASE_TAG}"
          VERSION_NUMBER="${TAG#v}"
          shopt -s nullglob
          jars=(dist/"${MOD_ID}"-*.jar)
          if [[ ${#jars[@]} -eq 0 ]]; then
            echo "No dist/${MOD_ID}-*.jar after download" >&2
            exit 1
          fi
          mapfile -t sorted < <(printf '%s\n' "${jars[@]}" | sort -V)
          game_versions=()
          for f in "${sorted[@]}"; do
            base=$(basename "$f")
            mc="${base#${MOD_ID}-}"
            mc="${mc%.jar}"
            game_versions+=("$mc")
          done
          mapfile -t game_versions < <(printf '%s\n' "${game_versions[@]}" | sort -uV)
          curl -fsSL -H "User-Agent: ${UA}" "https://api.modrinth.com/v2/tag/game_version" -o /tmp/modrinth-game-tags.json
          valid_set=$(jq -r '.[].version' /tmp/modrinth-game-tags.json | sort -u)
          filtered=()
          for v in "${game_versions[@]}"; do
            if echo "${valid_set}" | grep -qxF "${v}"; then
              filtered+=("${v}")
            else
              echo "::warning::Minecraft version '${v}' is not a Modrinth game tag; skipping it."
            fi
          done
          if [[ ${#filtered[@]} -eq 0 ]]; then
            echo "No game versions left after matching Modrinth /v2/tag/game_version" >&2
            exit 1
          fi
          game_versions_json=$(printf '%s\n' "${filtered[@]}" | jq -R . | jq -s .)
          CHANGELOG="$(gh release view "$TAG" --json body -q .body -R "${GITHUB_REPOSITORY}" 2>/dev/null || true)"
          proj_code=$(curl -sS -o /tmp/modrinth-project.json -w "%{http_code}" \
            -H "User-Agent: ${UA}" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            "https://api.modrinth.com/v2/project/${PROJECT_ID}")
          if [[ "${proj_code}" != "200" ]]; then
            echo "Modrinth project '${PROJECT_ID}' not found (HTTP ${proj_code}). Set repository variable MODRINTH_PROJECT_ID to your project slug or ID." >&2
            cat /tmp/modrinth-project.json >&2 || true
            exit 1
          fi
          parts=()
          file_args=()
          i=0
          for f in "${sorted[@]}"; do
            part="file${i}"
            parts+=("$part")
            file_args+=(-F "${part}=@${f}")
            ((i++)) || true
          done
          file_parts_json=$(printf '%s\n' "${parts[@]}" | jq -R . | jq -s .)
          jq -n \
            --arg name "$VERSION_NUMBER" \
            --arg version_number "$VERSION_NUMBER" \
            --arg changelog "$CHANGELOG" \
            --arg project_id "$PROJECT_ID" \
            --arg primary_file "${parts[0]}" \
            --argjson game_versions "$game_versions_json" \
            --argjson file_parts "$file_parts_json" \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              dependencies: [],
              game_versions: $game_versions,
              version_type: "release",
              loaders: ["fabric"],
              featured: false,
              project_id: $project_id,
              file_parts: $file_parts,
              primary_file: $primary_file
            }' > /tmp/modrinth-version.json
          echo "Uploading version ${VERSION_NUMBER} to Modrinth project ${PROJECT_ID} (game versions: $(IFS=,; echo "${filtered[*]}"))"
          # multipart 中 data 必须在所有文件字段之前（Labrinth 要求）
          http_code=$(curl -sS -w "%{http_code}" -o /tmp/modrinth-upload.json \
            -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "User-Agent: ${UA}" \
            -F "data=@/tmp/modrinth-version.json;type=application/json" \
            "${file_args[@]}")
          if [[ "${http_code}" != "200" ]]; then
            echo "Modrinth API returned HTTP ${http_code}" >&2
            cat /tmp/modrinth-upload.json >&2
            exit 1
          fi
          echo "Modrinth upload finished."
