# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      # 与 src/main/resources/fabric.mod.json 中 id 一致
      MOD_ID: mc-agents
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build all compatible Minecraft releases
        env:
          # 须与 fabric.mod.json 中 depends.minecraft 一致：>=1.19.4 <1.23（此处构建 1.19.4–1.21.x，与 Fabric API 发布一致）
          MIN_MC: '1.19.4'
          FABRIC_META_URL: 'https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/maven-metadata.xml'
        run: |
          set -euo pipefail
          mkdir -p dist
          curl -fsSL "$FABRIC_META_URL" -o /tmp/fabric-api-maven-metadata.xml
          # 从 Maven 元数据列出 fabric-api 正式版坐标（1.19.x / 1.20.x / 1.21.x）；不含快照
          grep -oE '[0-9]+\.[0-9.]+\+1\.(19|20|21)\.[0-9]+' /tmp/fabric-api-maven-metadata.xml | sort -uV > /tmp/fabric-api-all.txt
          [[ -s /tmp/fabric-api-all.txt ]] || { echo "No fabric-api versions parsed from metadata" >&2; exit 1; }
          # 每个游戏版本只取当前仍发布在元数据中的、该版本号下最新的 Fabric API
          mapfile -t MC_VERSIONS < <(sed 's/.*+//' /tmp/fabric-api-all.txt | sort -uV)
          for mc in "${MC_VERSIONS[@]}"; do
            low="$(printf '%s\n' "$MIN_MC" "$mc" | sort -V | head -1)"
            [[ "$low" == "$MIN_MC" ]] || continue
            latest="$(awk -F'+' -v mc="$mc" 'NF == 2 && $2 == mc' /tmp/fabric-api-all.txt | sort -V | tail -1)"
            [[ -n "$latest" ]] || continue
            echo "Building ${MOD_ID}-${mc}.jar (Fabric API ${latest})"
            ./gradlew clean build --no-daemon -Pminecraft_version="$mc" -Pfabric_api_version="$latest"
            JAR=""
            for f in build/libs/*.jar; do
              [[ -f "$f" ]] || continue
              case "$f" in
                *-sources.jar|*-dev.jar|*-javadoc.jar) continue ;;
                *) JAR="$f"; break ;;
              esac
            done
            if [[ -z "$JAR" ]]; then
              echo "No main jar found in build/libs" >&2
              ls -la build/libs/ || true
              exit 1
            fi
            cp "$JAR" "dist/${MOD_ID}-${mc}.jar"
          done
          ls -la dist/
      - name: upload jars to current GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          shopt -s nullglob
          files=(dist/"${MOD_ID}"-*.jar)
          [[ ${#files[@]} -gt 0 ]] || { echo "No dist/${MOD_ID}-*.jar to upload" >&2; exit 1; }
          gh release upload "$tag" "${files[@]}" --clobber
      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: dist/${{ env.MOD_ID }}-*.jar
